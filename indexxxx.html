<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>電子化料卡系統</title>

    <link rel="apple-touch-icon" href="https://i.postimg.cc/8knHmK0J/icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbz7JILdEj3U2bt_HCO8HolrVo0J_hHTj1D1ciN-h83A3BVfU6gTLUgFiPUn9xfPI0jWCw/exec">

    <style>
        /* 為了讓跳轉的這 0.5 秒不突兀，我們給它一個乾淨的底色 */
        body {
            background-color: #f4f6f9; /* 配合你系統的背景色 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* 啟動畫面的霧霾藍旋轉光圈 */
        .splash-spinner {
            width: 40px; height: 40px; 
            border: 3px solid rgba(146, 172, 209, 0.3); 
            border-top-color: #92acd1; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 12px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="splash-spinner"></div>
        <div style="font-size: 15px; font-weight: 600; color: #92acd1; letter-spacing: 1px;">系統啟動中...</div>
    </div>
</body>
</html>
