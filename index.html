<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>電子化料卡系統</title>

    <link rel="apple-touch-icon" href="https://i.postimg.cc/8knHmK0J/icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        /* 消除所有邊距，讓 iframe 可以 100% 貼齊螢幕邊緣 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* 防止外層滾動，只讓裡面的系統滾動 */
            background-color: #f4f6f9; /* 背景色防閃爍 */
        }
        /* 滿版玻璃櫥窗設定 */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbz7JILdEj3U2bt_HCO8HolrVo0J_hHTj1D1ciN-h83A3BVfU6gTLUgFiPUn9xfPI0jWCw/exec" allowfullscreen></iframe>

</body>
</html>
